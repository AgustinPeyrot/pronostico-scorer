<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport: evita zoom en inputs en iOS ───────────────────────────── -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- ── SEO y descripción ────────────────────────────────────────────────── -->
    <meta name="description"
          content="Anotador para el juego de cartas argentino Pronóstico. Registrá pronósticos, resultados y puntajes fácilmente desde tu celular. Funciona sin internet." />

    <!-- ── Theme color (barra del navegador / status bar) ───────────────────── -->
    <meta name="theme-color" content="#4338ca" />

    <!-- ── PWA: manifest ────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ── Apple / iOS ──────────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Pronóstico" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- ── Favicon ───────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/icons/pwa-192x192.png" />

    <!-- ── Microsoft / Windows tiles ─────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#4338ca" />
    <meta name="msapplication-TileImage" content="/icons/pwa-192x192.png" />

    <!-- ── Google Fonts ──────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet" />

    <title>Pronóstico – Anotador de cartas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
